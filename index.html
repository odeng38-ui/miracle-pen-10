<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Miracle Pen">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">

    <title>Miracle Pen 10</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="shortcut icon" href="icon.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=2">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=2">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-gold: #fbbf24;
            --text-white: #f8fafc;
            --app-height: 100dvh; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: var(--app-height);
            background-color: var(--bg-color);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-white);
            overflow: hidden; 
            display: flex;
            flex-direction: column;

            overscroll-behavior-y: none; 
            -webkit-user-select: none; 
            user-select: none;
        }

        #header {
            flex-shrink: 0; 
            padding: 15px 15px 10px;
            text-align: center;
            background: #1e293b;
        }
        
        #date-log { font-size: 0.75rem; color: #10b981; margin-bottom: 5px; font-weight: bold; }
        
        .page-indicator { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        #question-container {
            min-height: 60px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 1.15rem; font-weight: 700;
            color: var(--text-gold); line-height: 1.4; word-break: keep-all;
        }

        #canvas-wrapper {
            flex-grow: 1; 
            position: relative;
            margin: 10px 15px;
            border-radius: 15px;
            background-color: #1e293b; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
            overflow: hidden;
            border: 1px solid #334155; 
        }
        canvas { width: 100%; height: 100%; touch-action: none; display: block; }

        #controls {
            flex-shrink: 0;
            display: grid; grid-template-columns: 1.2fr 1.2fr 1fr 1.2fr; gap: 8px;
            padding: 10px 15px 15px; 
            background-color: var(--card-bg);
        }
        button {
            padding: 12px 2px; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            word-break: keep-all; 
        }
        .btn-undo { background: #64748b; color: white; }
        .btn-clear { background: #475569; color: white; }
        .btn-prev { background: #334155; color: #94a3b8; }
        .btn-next { background: #eab308; color: #000; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* 🚀 1. 호흡 오버레이 (알파파 세팅) */
        #breathe-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        /* 🚀 진짜 태양(Sun)처럼 눈부시게 폭발하는 오라(Aura) 디자인 */
        /* 모바일 강제 반전을 방지하기 위해 background 대신 오직 box-shadow만 사용해 코어를 꽉 채움 */
        .breathe-circle {
            width: 70px; height: 70px; border-radius: 50%;
            background-color: transparent; /* 반전 완전 차단 */
            border: none;
            box-shadow: 
                inset 0 0 20px 10px #fef08a, /* 태양 중심부(백열) */
                0 0 20px 10px #fef08a,       /* 코어 발광 */
                0 0 50px 20px #facc15,       /* 1차 황금빛 후광 */
                0 0 90px 40px #f59e0b,       /* 2차 따뜻한 주황빛 후광 */
                0 0 140px 60px #b45309;      /* 3차 깊은 붉은빛 에너지 */
            margin: 70px auto;
            will-change: transform;
        }

        #breathe-text { font-size: 1.2rem; font-weight: bold; color: var(--text-white); line-height:1.6; height: 70px; }
        .btn-skip { background: transparent; color: #94a3b8; border: 1px solid #475569; border-radius: 20px; padding: 8px 20px; font-size:0.85rem;}

        @keyframes breatheIn {
            from { transform: scale(1) translateZ(0); }
            to { transform: scale(3.5) translateZ(0); }
        }
        @keyframes breatheHold {
            from { transform: scale(3.5) translateZ(0); }
            to { transform: scale(3.6) translateZ(0); }
        }
        @keyframes breatheOut {
            from { transform: scale(3.6) translateZ(0); }
            to { transform: scale(1) translateZ(0); }
        }

        /* 🚀 4. 초연함의 시간 오버레이 */
        #letgo-overlay {
            position: fixed; inset: 0; background: #000000; z-index: 150;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: #f8fafc; padding: 20px;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            will-change: opacity;
        }
        #letgo-countdown {
            font-size: 3.5rem; color: #fbbf24; opacity: 0.6; margin-top: 40px; font-weight: 300;
        }

        #complete-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #summary-box {
            width: 100%; max-width: 350px; max-height: 45vh; 
            overflow-y: auto; background: #0f172a; border-radius: 10px;
            padding: 15px; margin: 10px 0; text-align: left;
            border: 1px solid #334155; box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        #summary-box::-webkit-scrollbar { width: 4px; }
        #summary-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .summary-item {
            font-size: 0.95rem; color: var(--text-white); margin-bottom: 12px;
            line-height: 1.45; word-break: keep-all;
        }
        .summary-item:last-child { margin-bottom: 0; }
        .summary-num { color: #fbbf24; font-weight: bold; margin-right: 5px; }

    </style>
</head>
<body>

<!-- 🚀 1. 뇌파 조율(호흡) 오버레이 -->
<div id="breathe-overlay">
    <h2 style="color:#fbbf24; margin-bottom: 20px;">무의식 동기화</h2>
    <p style="color:#94a3b8; font-size: 0.9rem; line-height:1.5;">글씨를 쓰기 전, 뇌의 거짓말 탐지기를 끄고<br>가장 평온한 '알파파' 상태로 진입합니다.</p>
    <div id="breathe-circle" class="breathe-circle"></div>
    <div id="breathe-text">준비...</div>
    <button class="btn-skip" onclick="endBreathing()" style="margin-top: 50px;">건너뛰기 (시작)</button>
</div>

<!-- 🚀 4. 초연함 오버레이 -->
<div id="letgo-overlay">
    <div style="font-size: 1.3rem; line-height: 1.6; margin-bottom: 20px; color:#fbbf24;">수고하셨습니다.</div>
    <p style="font-size: 1.1rem; line-height: 1.6; color:#e2e8f0;">이제 모든 간절함을 우주에 맡기고<br>완전히 초연해지세요.</p>
    <p style="font-size: 0.95rem; color:#64748b; margin-top: 15px;">근육의 긴장을 풀고 편안히 빗장을 풉니다.</p>
    <div id="letgo-countdown">5</div>
</div>

<div id="header">
    <div id="date-log">최근 달성일: 기록 없음</div>
    <div class="page-indicator" id="page-num">STEP 01 / 10</div>
    <div id="question-container">질문을 불러오는 중...</div>
</div>

<div id="canvas-wrapper">
    <canvas id="writeCanvas"></canvas>
</div>

<div id="controls">
    <button class="btn-undo" onclick="undo()">↩ 취소</button>
    <button class="btn-clear" onclick="clearCanvas()">전체 지움</button>
    <button class="btn-prev" onclick="prevStep()">이전</button>
    <button class="btn-next" onclick="nextStep()" id="next-btn">다음 단계</button>
</div>

<div id="complete-overlay">
    <h2 style="color:#fbbf24; margin-bottom:5px;">Mission Complete!</h2>
    <p id="streak-msg" style="color:#10b981; font-weight:bold; margin-top:5px; margin-bottom:10px;"></p>
    
    <div id="summary-box"></div>
    
    <p style="line-height:1.4; margin-top:10px; margin-bottom:5px; font-size: 0.9rem; color: #94a3b8;">눈으로 훑으며 평온함 속에 머무르세요.</p>
    <button class="btn-next" style="width: 180px; margin-top:10px;" onclick="restart()">내일 다시 하기</button>
</div>

<script>
    const afformations = [
        "왜 나는 이미 충분하고 완벽한가?",
        "왜 매달 5,000만 원이 당연하게 들어오는가?",
        "왜 자산 100억 달성은 이토록 쉬운가?",
        "왜 내 시스템은 잠잘 때도 부를 가져다주는가?",
        "왜 나는 압도적인 성과를 내는 리더인가?",
        "왜 나는 딸에게 최고의 영감이 되는 아빠인가?",
        "왜 내 책은 세상을 바꾸는 베스트셀러인가?",
        "왜 온 우주는 나를 운 좋은 길로만 이끄는가?",
        "왜 나는 평온하게 원하는 현실을 창조하는가?",
        "왜 내 삶은 매일 기적으로 가득한가?"
    ];

    let currentIndex = 0;
    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d', { desynchronized: true }); 
    let isDrawing = false;
    let undoHistory = []; 

    // 🚀 1. 호흡 애니메이션 로직 (모바일 PWA 완벽 최적화)
    let breatheTimer1, breatheTimer2, breatheTimer3;

    function startBreathing() {
        document.getElementById('complete-overlay').style.display = 'none';
        const overlay = document.getElementById('breathe-overlay');
        const circle = document.getElementById('breathe-circle');
        const text = document.getElementById('breathe-text');
        
        overlay.style.display = 'flex';
        
        // 애니메이션 초기화 포맷
        circle.style.animation = 'none';
        void circle.offsetWidth; // 브라우저에 강제 리렌더링 명령 (매우 중요)
        
        text.innerText = "준비...";

        setTimeout(() => {
            text.innerHTML = "코로 깊게 들이마시세요... <br><span style='color:#fbbf24; font-size:0.9rem;'>(4초)</span>";
            circle.style.animation = 'breatheIn 4s linear forwards';
            
            breatheTimer1 = setTimeout(() => {
                text.innerHTML = "숨을 멈추고 에너지에 집중하세요... <br><span style='color:#fbbf24; font-size:0.9rem;'>(7초)</span>";
                circle.style.animation = 'breatheHold 7s linear forwards';
                
                breatheTimer2 = setTimeout(() => {
                    text.innerHTML = "입으로 길게 끝까지 내뱉으세요... <br><span style='color:#fbbf24; font-size:0.9rem;'>(8초)</span>";
                    circle.style.animation = 'breatheOut 8s linear forwards';
                    
                    breatheTimer3 = setTimeout(() => {
                        endBreathing();
                    }, 8000);
                }, 7000);
            }, 4000);
        }, 1500);
    }

    function endBreathing() {
        clearTimeout(breatheTimer1);
        clearTimeout(breatheTimer2);
        clearTimeout(breatheTimer3);
        const overlay = document.getElementById('breathe-overlay');
        overlay.style.display = 'none';
        // 확실히 없애서 클릭 방해 방지
        const circle = document.getElementById('breathe-circle');
        circle.style.animation = 'none'; 
        updateUI(); 
    }

    // 🚀 4. 초연함의 5초 (Letting Go) 로직
    function startLettingGo() {
        const overlay = document.getElementById('letgo-overlay');
        const countdownEl = document.getElementById('letgo-countdown');
        overlay.style.display = 'flex';
        
        setTimeout(() => { overlay.style.opacity = '1'; }, 50);

        let count = 5;
        countdownEl.innerText = count;
        
        const letgoInterval = setInterval(() => {
            count--;
            countdownEl.innerText = count;
            if (count <= 0) {
                clearInterval(letgoInterval);
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    showCompleteOverlay();
                }, 1500); 
            }
        }, 1000);
    }

    function showCompleteOverlay() {
        const totalDays = saveCompletionRecord();
        document.getElementById('streak-msg').innerText = `🔥 누적 ${totalDays}일째 목표 달성 완료!`;
        document.getElementById('complete-overlay').style.display = 'flex';
    }

    function loadDateLog() {
        const lastDate = localStorage.getItem('miracle_pen_last_date');
        if (lastDate) {
            document.getElementById('date-log').innerText = `최근 달성일: ${lastDate}`;
        }
    }

    function saveCompletionRecord() {
        const today = new Date().toLocaleDateString('ko-KR');
        let dates = JSON.parse(localStorage.getItem('miracle_pen_dates') || "[]");
        
        if (!dates.includes(today)) {
            dates.push(today);
            localStorage.setItem('miracle_pen_dates', JSON.stringify(dates));
        }
        
        localStorage.setItem('miracle_pen_last_date', today);
        loadDateLog(); 
        
        return dates.length; 
    }

    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = wrapper.clientWidth * dpr;
        canvas.height = wrapper.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        clearCanvas();
    }

    function saveState() {
        if (!canvas.width || !canvas.height) return;
        undoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        if (undoHistory.length > 30) {
            undoHistory.shift(); 
        }
    }

    function undo() {
        if (undoHistory.length > 1) {
            undoHistory.pop(); 
            const previousState = undoHistory[undoHistory.length - 1]; 
            ctx.putImageData(previousState, 0, 0); 
        }
    }

    function clearCanvas() {
        ctx.fillStyle = "#1e293b"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        undoHistory = [];
        saveState();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        isDrawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        
        ctx.lineWidth = 3; 
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#fbbf24'; 
        
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            ctx.closePath();
            saveState(); 
        }
    }

    function updateUI() {
        document.getElementById('question-container').innerText = afformations[currentIndex];
        document.getElementById('page-num').innerText = `STEP ${String(currentIndex + 1).padStart(2, '0')} / 10`;
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = (currentIndex === afformations.length - 1) ? "완료하기" : "다음 단계";
        clearCanvas();
    }

    function nextStep() {
        if (currentIndex < afformations.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            // 🚀 10개 문장 끝! 이제 초연함의 시간으로 넘어감
            startLettingGo();
        }
    }

    function prevStep() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    }

    function restart() {
        currentIndex = 0;
        startBreathing(); 
    }

    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing, {passive: false});
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    window.onload = () => {
        resizeCanvas();
        loadDateLog(); 
        
        const summaryBox = document.getElementById('summary-box');
        summaryBox.innerHTML = afformations.map((text, idx) => 
            `<div class="summary-item"><span class="summary-num">${idx + 1}.</span> ${text}</div>`
        ).join('');

        // 🚀 앱이 켜지자마자 호흡 시작!
        startBreathing();
    };
    
    window.addEventListener('resize', () => {
        setTimeout(resizeCanvas, 100);
    });
</script>

</body>
</html>
