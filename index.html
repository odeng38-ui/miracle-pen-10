<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
    <title>Sacred Space - Miracle Pen</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Sacred Space">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f7f9fc">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Serif+KR:ital,wght@0,300;0,400;0,700;1,300&family=Nanum+Pen+Script&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#002045",
                        "primary-container": "#1a365d",
                        "on-primary": "#ffffff",
                        "secondary": "#5e5e5e",
                        "tertiary": "#735c00",
                        "surface": "#f7f9fc",
                        "on-surface": "#191c1e",
                        "outline": "#74777f",
                        "outline-variant": "#c4c6cf",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eceef1",
                    },
                    fontFamily: {
                        "headline": ["Noto Serif KR", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "handwriting": ["Nanum Pen Script", "cursive"]
                    }
                }
            }
        }
    </script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .bg-aura { background: radial-gradient(circle at 20% 30%, #f0f4f8 0%, #f7f9fc 100%); }
        .canvas-paper {
            background-image: radial-gradient(#e0e3e6 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .fade-in-float { animation: fadeInFloat 0.8s ease-out forwards; }
        @keyframes fadeInFloat { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        canvas { touch-action: none; display: block; width: 100%; height: 100%; }

        /* Overlays Styles */
        .overlay { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* Breathe Circle */
        .breathe-circle {
            width: 40px; height: 40px; border-radius: 50%;
            box-shadow: 0 0 30px 15px rgba(173, 199, 247, 0.4);
            background: #adc7f7;
            margin: 40px auto; 
            will-change: transform;
        }
        @keyframes breatheIn { from { transform: scale(1); } to { transform: scale(4.5); } }
        @keyframes breatheHold { from { transform: scale(4.5); } to { transform: scale(4.8); } }
        @keyframes breatheOut { from { transform: scale(4.8); } to { transform: scale(1); } }

        /* Vision Overlay */
        #vision-image { flex-grow: 1; width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; filter: brightness(1.1) contrast(1.05); }
    </style>
</head>

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-x-hidden">

<!-- 🌬️ Breathe Overlay -->
<div id="breathe-overlay" class="overlay bg-white/90 dark:bg-slate-900/90">
    <span class="text-tertiary font-label text-[10px] tracking-[0.25em] uppercase font-bold mb-4">Preparation</span>
    <h2 class="text-3xl font-headline text-primary mb-2">무의식 동기화</h2>
    <p class="text-outline text-sm mb-8 text-center px-12">글씨를 쓰기 전, 평온한 상태로 진입합니다.</p>
    <div id="breathe-circle" class="breathe-circle"></div>
    <div id="breathe-text" class="text-xl font-headline text-primary-container h-12 text-center">준비...</div>
    <button onclick="endBreathing()" class="mt-20 text-outline text-xs border border-outline/30 px-6 py-2 rounded-full hover:bg-surface transition-colors">건너뛰기</button>
</div>

<!-- 🖼️ Vision Overlay -->
<div id="vision-overlay" class="overlay bg-black">
    <div id="vision-bg" class="absolute inset-0 opacity-30 scale-110 blur-3xl bg-cover bg-center"></div>
    <div id="vision-image" class="relative z-10 transition-transform duration-1000"></div>
    <div class="relative z-20 pb-12 w-full px-8 flex flex-col items-center gap-6">
        <p class="text-white/60 font-serif italic text-lg text-center drop-shadow-lg" id="vision-text"></p>
        <button id="vision-next-btn" onclick="nextStep()" class="w-full max-w-xs py-4 rounded-full bg-white text-primary font-semibold shadow-2xl hover:bg-opacity-90 transition-all active:scale-95">다음 단계로</button>
    </div>
</div>

<!-- 🌑 Let Go Overlay -->
<div id="letgo-overlay" class="overlay bg-primary text-on-primary opacity-0 transition-opacity duration-1000">
    <h2 class="text-2xl font-headline italic mb-4">수고하셨습니다.</h2>
    <p class="text-center text-on-primary/70 leading-relaxed mb-12">이제 모든 간절함을 우주에 맡기고<br>완전히 초연해지세요.</p>
    <div id="letgo-countdown" class="text-6xl font-light text-white/40">5</div>
</div>

<!-- 🏆 Complete Overlay -->
<div id="complete-overlay" class="overlay bg-surface bg-aura">
    <div class="w-full max-w-md px-6 flex flex-col items-center">
        <span class="material-symbols-outlined text-6xl text-tertiary mb-4" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
        <h2 class="text-3xl font-headline text-primary mb-2">Mission Complete!</h2>
        <p id="streak-msg" class="text-secondary font-medium mb-8"></p>
        
        <div id="summary-box" class="w-full bg-white/50 border border-outline-variant/30 rounded-3xl p-6 space-y-4 max-h-[40vh] overflow-y-auto mb-8 shadow-inner"></div>
        
        <button onclick="restart()" class="w-full py-4 rounded-full bg-primary text-on-primary font-bold shadow-xl hover:bg-primary-container transition-all active:scale-95">오늘의 어포메이션 완료하기</button>
    </div>
</div>

<!-- 📱 Main App Structure (Stitch Inspired) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white/60 backdrop-blur-xl border-b border-outline-variant/10">
    <button class="text-primary hover:opacity-60"><span class="material-symbols-outlined">close</span></button>
    <h1 class="font-headline text-xl italic text-primary">Sacred Space</h1>
    <button class="text-primary hover:opacity-60"><span class="material-symbols-outlined">more_vert</span></button>
</header>

<main class="flex-1 flex flex-col pt-24 pb-8 px-6 max-w-lg mx-auto w-full bg-aura">
    <!-- Progress -->
    <div class="mb-6 fade-in-float">
        <div class="flex items-end gap-2 mb-2">
            <span id="step-num-big" class="text-2xl font-light font-headline text-primary opacity-60">01</span>
            <span class="text-sm font-body text-outline mb-0.5 tracking-widest uppercase">/ 10</span>
        </div>
        <div class="w-full h-0.5 bg-surface-container rounded-full overflow-hidden">
            <div id="progress-bar" class="w-[10%] h-full bg-primary rounded-full transition-all duration-700"></div>
        </div>
    </div>

    <!-- Content -->
    <section class="flex-grow flex flex-col min-h-0">
        <div class="space-y-2 mb-4">
            <div class="flex justify-between items-center">
                <span class="text-tertiary font-body text-[9px] tracking-[0.2em] uppercase font-bold" id="step-category">Daily Afformation</span>
                <button id="tts-btn" onclick="speakAfformation()" class="flex items-center gap-1.5 bg-primary/5 text-primary text-[10px] font-bold px-2.5 py-1 rounded-full border border-primary/10 transition-all">
                    <span class="material-symbols-outlined text-xs">volume_up</span>음성
                </button>
            </div>
            <h2 id="question-container" class="text-xl md:text-2xl font-headline text-on-surface leading-snug">질문을 불러오는 중...</h2>
        </div>

        <!-- Canvas Area -->
        <div class="flex-grow flex flex-col min-h-0">
            <div class="flex items-center justify-between px-1 mb-2">
                <label class="font-body text-[9px] text-outline tracking-widest uppercase">Handwritten Reflection</label>
                <div class="flex gap-4">
                    <button onclick="undo()" class="flex items-center gap-1 text-primary/70 text-[10px] font-bold hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-xs">undo</span>취소
                    </button>
                    <button onclick="clearCanvas()" class="text-outline text-[10px] hover:text-primary transition-colors">전체 지움</button>
                </div>
            </div>
            <div id="canvas-wrapper" class="relative w-full flex-grow rounded-3xl overflow-hidden shadow-2xl bg-primary border-4 border-white/10 group">
                <canvas id="writeCanvas"></canvas>
                <!-- Tool Hint Overlay -->
                <div id="canvas-hint" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center pointer-events-none transition-opacity duration-500 opacity-20">
                    <span class="material-symbols-outlined text-4xl text-white/50 mb-2">edit_square</span>
                    <p class="font-handwriting text-2xl text-white/40">이곳에 마음을 써보세요</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Navigation -->
    <div class="mt-4 flex flex-col items-center gap-3">
        <div class="flex w-full gap-2">
            <button onclick="prevStep()" class="flex-1 py-3 rounded-2xl border border-outline-variant/30 text-secondary text-sm font-medium hover:bg-white active:scale-95 transition-all">이전</button>
            <button onclick="showVisionBoard()" id="view-img-btn" class="flex-[2.5] py-3 rounded-2xl bg-primary text-on-primary text-sm font-medium tracking-wide flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                <span>이미지 감상 & 다음</span>
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </div>
    </div>
</main>

<script>
    const afformations = [
        "왜 나는 이미 충분하고 완벽한가?",
        "왜 매달 5,000만 원이 당연하게 들어오는가?",
        "왜 자산 100억 달성은 이토록 쉬운가?",
        "왜 내 시스템은 잠잘 때도 부를 가져다주는가?",
        "왜 나는 압도적인 성과를 내는 리더인가?",
        "왜 나는 딸에게 최고의 영감이 되는 아빠인가?",
        "왜 내 책은 세상을 바꾸는 베스트셀러인가?",
        "왜 온 우주는 나를 운 좋은 길로만 이끄는가?",
        "왜 나는 평온하게 원하는 현실을 창조하는가?",
        "왜 내 삶은 매일 기적으로 가득한가?"
    ];

    let currentIndex = 0;
    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d', { desynchronized: true });
    let isDrawing = false;
    let hasDrawn = false;
    let undoHistory = [];

    const synth = window.speechSynthesis;

    // --- Core Logic ---

    function updateUI() {
        // Cancel TTS if speaking
        if (synth.speaking) synth.cancel();

        const q = afformations[currentIndex];
        document.getElementById('question-container').innerText = q;
        document.getElementById('step-num-big').innerText = String(currentIndex + 1).padStart(2, '0');
        document.getElementById('progress-bar').style.width = `${(currentIndex + 1) * 10}%`;
        
        clearCanvas();
        hasDrawn = false;
        document.getElementById('canvas-hint').style.opacity = '0.4';
    }

    function speakAfformation() {
        if (synth.speaking) {
            synth.cancel();
            resetTTSButton();
            return;
        }

        const text = afformations[currentIndex];
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = synth.getVoices();
        const koVoice = voices.find(v => v.lang.includes('ko'));
        if (koVoice) utterance.voice = koVoice;
        utterance.rate = 0.9;

        const btn = document.getElementById('tts-btn');
        const originalHtml = btn.innerHTML;
        
        utterance.onstart = () => {
            btn.innerHTML = `<span class="material-symbols-outlined text-sm animate-pulse">pause</span> 재생 중...`;
            btn.classList.add('bg-primary/20');
        };
        utterance.onend = () => {
            btn.innerHTML = originalHtml;
            btn.classList.remove('bg-primary/20');
        };
        
        synth.speak(utterance);
    }

    function resetTTSButton() {
        const btn = document.getElementById('tts-btn');
        btn.innerHTML = `<span class="material-symbols-outlined text-sm">volume_up</span> 음성 듣기`;
        btn.classList.remove('bg-primary/20');
    }

    // --- Canvas Logic ---

    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = wrapper.clientWidth * dpr;
        canvas.height = wrapper.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        clearCanvas();
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hasDrawn = false;
        document.getElementById('canvas-hint').style.opacity = '0.4';
        saveState(); // Record the cleared state
    }

    function saveState() {
        const dpr = window.devicePixelRatio || 1;
        undoHistory.push(ctx.getImageData(0, 0, canvas.width * dpr, canvas.height * dpr));
        if (undoHistory.length > 30) undoHistory.shift();
    }

    function undo() {
        if (undoHistory.length > 1) {
            undoHistory.pop(); // Remove current state
            const prevState = undoHistory[undoHistory.length - 1];
            ctx.putImageData(prevState, 0, 0);
            if (undoHistory.length === 1) {
                 hasDrawn = false;
                 document.getElementById('canvas-hint').style.opacity = '0.4';
            }
        } else {
            clearCanvas();
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
        const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        isDrawing = true;
        hasDrawn = true;
        document.getElementById('canvas-hint').style.opacity = '0';
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#ffffff'; 
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            saveState(); // Save state when stroke ends
        }
    }

    // --- Step Navigation & Overlays ---

    function showVisionBoard() {
        const overlay = document.getElementById('vision-overlay');
        const img = document.getElementById('vision-image');
        const bg = document.getElementById('vision-bg');
        const txt = document.getElementById('vision-text');
        
        const url = `url('afformation_${currentIndex + 1}.png')`;
        img.style.backgroundImage = url;
        bg.style.backgroundImage = url;
        txt.innerText = afformations[currentIndex];

        const btn = document.getElementById('vision-next-btn');
        btn.innerText = (currentIndex === afformations.length - 1) ? "마무리 단계로" : "다음 단계로";
        
        overlay.style.display = 'flex';
    }

    function nextStep() {
        document.getElementById('vision-overlay').style.display = 'none';
        if (currentIndex < afformations.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            startLettingGo();
        }
    }

    function prevStep() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    }

    // --- Breathing ---

    let bTimer;
    function startBreathing() {
        const overlay = document.getElementById('breathe-overlay');
        const circle = document.getElementById('breathe-circle');
        const text = document.getElementById('breathe-text');
        
        overlay.style.display = 'flex';
        circle.style.animation = 'none';
        text.innerText = "준비...";

        setTimeout(() => {
            text.innerHTML = "코로 깊게 들이마시세요... (4초)";
            circle.style.animation = 'breatheIn 4s linear forwards';
            bTimer = setTimeout(() => {
                text.innerHTML = "숨을 멈추고 에너지에 집중하세요... (7초)";
                circle.style.animation = 'breatheHold 7s linear forwards';
                bTimer = setTimeout(() => {
                    text.innerHTML = "입으로 길게 내뱉으세요... (8초)";
                    circle.style.animation = 'breatheOut 8s linear forwards';
                    bTimer = setTimeout(endBreathing, 8000);
                }, 7000);
            }, 4000);
        }, 1500);
    }

    function endBreathing() {
        clearTimeout(bTimer);
        document.getElementById('breathe-overlay').style.display = 'none';
        updateUI();
    }

    // --- Letting Go ---

    function startLettingGo() {
        const overlay = document.getElementById('letgo-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => overlay.style.opacity = '1', 50);

        let count = 5;
        const countdown = document.getElementById('letgo-countdown');
        const itv = setInterval(() => {
            count--;
            countdown.innerText = count;
            if (count <= 0) {
                clearInterval(itv);
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    showCompleteOverlay();
                }, 1500);
            }
        }, 1000);
    }

    function showCompleteOverlay() {
        const today = new Date().toLocaleDateString('ko-KR');
        let dates = JSON.parse(localStorage.getItem('miracle_pen_dates') || "[]");
        
        // Save today's completion
        if (!dates.includes(today)) {
            dates.push(today);
            localStorage.setItem('miracle_pen_dates', JSON.stringify(dates));
        }

        // Calculate continuous streak (simple version)
        let streak = 0;
        const sortedDates = dates.map(d => new Date(d)).sort((a,b) => b-a);
        let curr = new Date().setHours(0,0,0,0);
        
        for (let d of sortedDates) {
            const di = new Date(d).setHours(0,0,0,0);
            if (curr === di) {
                streak++;
                curr -= 86400000;
            } else if (di < curr) {
                break;
            }
        }

        document.getElementById('streak-msg').innerHTML = `
            <div class="flex flex-col items-center gap-2">
                <span class="text-primary text-xl font-headline italic">현재 ${streak}일 연속 달성 중!</span>
                <span class="text-secondary text-sm font-medium opacity-80">누적 성공 일수: ${dates.length}일</span>
            </div>
        `;

        const summary = document.getElementById('summary-box');
        summary.innerHTML = afformations.map((t, i) => `
            <div class="py-2 border-b border-outline-variant/10 last:border-none">
                <p class="text-sm text-primary/90 leading-relaxed"><span class="font-bold text-tertiary mr-2 italic">${i+1}.</span>${t}</p>
            </div>
        `).join('');
        document.getElementById('complete-overlay').style.display = 'flex';
        
        // Celebration Alert (Simple popup style)
        setTimeout(() => {
            alert(`🎉 축하합니다! ${streak}일 연속 목표를 달성하셨습니다.`);
        }, 500);
    }

    function restart() {
        currentIndex = 0;
        document.getElementById('complete-overlay').style.display = 'none';
        startBreathing();
    }

    // --- Listeners ---

    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    window.onload = () => {
        resizeCanvas();
        startBreathing();
    };

    window.addEventListener('resize', () => { setTimeout(resizeCanvas, 100); });
</script>

</body>
</html>
