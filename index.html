    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }

        .canvas-paper {
            background-image: radial-gradient(#e0e3e6 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .fade-in-float { animation: fadeInFloat 0.8s ease-out forwards; }
        @keyframes fadeInFloat { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        canvas { touch-action: none; display: block; width: 100%; height: 100%; }

        /* Overlays Styles */
        .overlay { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .overlay.active { display: flex; }
        
        /* Breathe Circle */
        .breathe-circle {
            width: 40px; height: 40px; border-radius: 50%;
            box-shadow: 0 0 30px 15px rgba(173, 199, 247, 0.4);
            background: #adc7f7;
            margin: 40px auto; 
            will-change: transform;
        }
        @keyframes breatheIn { from { transform: scale(1); } to { transform: scale(4.5); } }
        @keyframes breatheHold { from { transform: scale(4.5); } to { transform: scale(4.8); } }
        @keyframes breatheOut { from { transform: scale(4.8); } to { transform: scale(1); } }

        #vision-image { flex-grow: 1; width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; filter: brightness(1.1) contrast(1.05); }

</head>

    const rememberWhen = [
        "월 5,000만 원이 목표라며 계산기를 두드기던 그때가 기억나네. 지금은 이게 당연한 일상이 되었는데 말이야.",
        "한화라이프랩 지점 코드를 처음 받고 실적 없다고 고민하던 26년 3월이 기억나네. 지금 이 거대한 조직을 보면 참 격세지감이야.",
        "TrackVelop이 겨우 내 노트북 안에만 있었던 그때가 기억나네. 지금은 수많은 자산가의 필수품이 되었는데.",
        "결과가 안 나온다고 '내려놓음'을 연습하던 그 초조했던 순간들이 기억나네. 결국 신의 흐름대로 다 될 일이었는데 말이지."
    ];

    let currentList = [];
    let currentMode = 'afformation';
    let currentIndex = 0;
    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d', { desynchronized: true });
    let isDrawing = false;
    let hasDrawn = false;
    let undoHistory = [];

    // --- Core Logic ---

    function goHome() {
        document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
        document.getElementById('home-overlay').classList.add('active');
        updateHomeUI();
    }

    function updateHomeUI() {
        const lastSession = JSON.parse(localStorage.getItem('last_afformation_session') || "null");
        const historyBtn = document.getElementById('view-history-btn');
        if (lastSession) {
            historyBtn.classList.remove('hidden');
        } else {
            historyBtn.classList.add('hidden');
        }
    }

    function selectMode(mode) {
        currentMode = mode;
        if (mode === 'afformation') {
            currentList = afformationsData.map(category => {
                return category[Math.floor(Math.random() * category.length)];
            });
            document.getElementById('header-title').innerText = "Afformation";
            document.getElementById('step-category').innerText = "Daily Afformation";
        } else {
            currentList = rememberWhen;
            document.getElementById('header-title').innerText = "Remember When";
            document.getElementById('step-category').innerText = "Future Memory";
        }
        
        currentIndex = 0;
        document.getElementById('home-overlay').classList.remove('active');
        startBreathing();
    }

    function updateUI() {
        const q = currentList[currentIndex];
        document.getElementById('question-container').innerText = q;
        document.getElementById('step-num-big').innerText = String(currentIndex + 1).padStart(2, '0');
        
        const total = currentList.length;
        document.getElementById('step-total').innerText = `/ ${total}`;
        document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / total) * 100}%`;
        
        clearCanvas();
        hasDrawn = false;
        document.getElementById('canvas-hint').style.opacity = '0.4';
    }

    // --- Canvas Logic ---

    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = wrapper.clientWidth * dpr;
        canvas.height = wrapper.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        clearCanvas();
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hasDrawn = false;
        document.getElementById('canvas-hint').style.opacity = '0.4';
        saveState();
    }

    function saveState() {
        const dpr = window.devicePixelRatio || 1;
        undoHistory.push(ctx.getImageData(0, 0, canvas.width * dpr, canvas.height * dpr));
        if (undoHistory.length > 30) undoHistory.shift();
    }

    function undo() {
        if (hasDrawn && undoHistory.length > 1) {
            undoHistory.pop(); 
            const prevState = undoHistory[undoHistory.length - 1];
            ctx.putImageData(prevState, 0, 0);
            if (undoHistory.length <= 1) {
                 hasDrawn = false;
                 document.getElementById('canvas-hint').style.opacity = '0.4';
            }
        } else {
            clearCanvas();
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
        const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        isDrawing = true;
        hasDrawn = true;
        document.getElementById('canvas-hint').style.opacity = '0';
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#ffffff'; 
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            saveState();
        }
    }

    // --- Navigation ---

    function showVisionBoard() {
        const overlay = document.getElementById('vision-overlay');
        const img = document.getElementById('vision-image');
        const bg = document.getElementById('vision-bg');
        const txt = document.getElementById('vision-text');
        
        const imgPrefix = (currentMode === 'afformation') ? 'afformation_' : 'remember_';
        const url = `url('${imgPrefix}${currentIndex + 1}.png')`;
        img.style.backgroundImage = url;
        bg.style.backgroundImage = url;
        txt.innerText = currentList[currentIndex];

        const btn = document.getElementById('vision-next-btn');
        btn.innerText = (currentIndex === currentList.length - 1) ? "마무리 단계로" : "다음 단계로";
        
        overlay.classList.add('active');
    }

    function nextStep() {
        document.getElementById('vision-overlay').classList.remove('active');
        if (currentIndex < currentList.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            startLettingGo();
        }
    }

    function prevStep() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    }

    // --- Breathing ---

    let bTimer;
    function startBreathing() {
        const overlay = document.getElementById('breathe-overlay');
        const circle = document.getElementById('breathe-circle');
        const text = document.getElementById('breathe-text');
        
        overlay.classList.add('active');
        circle.style.animation = 'none';
        text.innerText = "준비...";

        setTimeout(() => {
            text.innerHTML = "코로 깊게 들이마시세요... (4초)";
            circle.style.animation = 'breatheIn 4s linear forwards';
            bTimer = setTimeout(() => {
                text.innerHTML = "숨을 멈추고 에너지에 집중하세요... (7초)";
                circle.style.animation = 'breatheHold 7s linear forwards';
                bTimer = setTimeout(() => {
                    text.innerHTML = "입으로 길게 내뱉으세요... (8초)";
                    circle.style.animation = 'breatheOut 8s linear forwards';
                    bTimer = setTimeout(endBreathing, 8000);
                }, 7000);
            }, 4000);
        }, 1500);
    }

    function endBreathing() {
        clearTimeout(bTimer);
        document.getElementById('breathe-overlay').classList.remove('active');
        updateUI();
    }

    // --- Letting Go & Completion ---

    function startLettingGo() {
        const overlay = document.getElementById('letgo-overlay');
        overlay.classList.add('active');
        setTimeout(() => overlay.style.opacity = '1', 50);

        let count = 5;
        const countdown = document.getElementById('letgo-countdown');
        const itv = setInterval(() => {
            count--;
            countdown.innerText = count;
            if (count <= 0) {
                clearInterval(itv);
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.remove('active');
                    showCompleteOverlay();
                }, 1500);
            }
        }, 1000);
    }

    function showCompleteOverlay() {
        const today = new Date().toLocaleDateString('ko-KR');
        let dates = JSON.parse(localStorage.getItem('miracle_pen_dates') || "[]");
        
        if (!dates.includes(today)) {
            dates.push(today);
            localStorage.setItem('miracle_pen_dates', JSON.stringify(dates));
        }

        if (currentMode === 'afformation') {
            localStorage.setItem('last_afformation_session', JSON.stringify({
                date: today,
                questions: currentList
            }));
        }

        let streak = 0;
        const sortedDates = dates.map(d => new Date(d)).sort((a,b) => b-a);
        let curr = new Date().setHours(0,0,0,0);
        
        for (let d of sortedDates) {
            const di = new Date(d).setHours(0,0,0,0);
            if (curr === di) {
                streak++;
                curr -= 86400000;
            } else if (di < curr) {
                break;
            }
        }

        document.getElementById('streak-msg').innerHTML = `
            <div class="flex flex-col items-center gap-2">
                <span class="text-primary text-xl font-headline italic">현재 ${streak}일 연속 달성 중!</span>
                <span class="text-secondary text-sm font-medium opacity-80">누적 성공 일수: ${dates.length}일</span>
            </div>
        `;

        const summary = document.getElementById('summary-box');
        summary.innerHTML = currentList.map((t, i) => `
            <div class="py-2 border-b border-outline-variant/10 last:border-none">
                <p class="text-sm text-primary/90 leading-relaxed"><span class="font-bold text-tertiary mr-2 italic">${i+1}.</span>${t}</p>
            </div>
        `).join('');
        document.getElementById('complete-overlay').classList.add('active');
        
        setTimeout(() => {
            alert(`🎉 축하합니다! ${streak}일 연속 목표를 달성하셨습니다.`);
        }, 500);
    }

    function showHistory() {
        const lastSession = JSON.parse(localStorage.getItem('last_afformation_session') || "null");
        if (!lastSession) return;

        const summary = document.getElementById('summary-box');
        summary.innerHTML = `
            <div class="mb-4 text-center">
                <span class="text-[10px] text-outline uppercase tracking-widest">${lastSession.date}의 기록</span>
            </div>
            ${lastSession.questions.map((t, i) => `
                <div class="py-2 border-b border-outline-variant/10 last:border-none">
                    <p class="text-sm text-primary/90 leading-relaxed"><span class="font-bold text-tertiary mr-2 italic">${i+1}.</span>${t}</p>
                </div>
            `).join('')}
        `;
        
        document.getElementById('header-title').innerText = "Last Session";
        document.getElementById('complete-overlay').classList.add('active');
        const finishBtn = document.querySelector('#complete-overlay button');
        const originalText = finishBtn.innerText;
        finishBtn.innerText = "홈으로 돌아가기";
        
        const originalFinish = finishSession;
        window.finishSession = function() {
            finishBtn.innerText = originalText;
            originalFinish();
            window.finishSession = originalFinish;
        };
    }

    function finishSession() {
        document.getElementById('complete-overlay').classList.remove('active');
        goHome();
    }

    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    window.onload = () => {
        resizeCanvas();
        updateHomeUI();
    };

    window.addEventListener('resize', () => { setTimeout(resizeCanvas, 100); });
</script>

</body>
</html>
