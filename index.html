<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">

    <title>Miracle Pen 10</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-gold: #fbbf24;
            --text-white: #f8fafc;
            --app-height: 100dvh; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: var(--app-height);
            background-color: var(--bg-color);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-white);
            overflow: hidden; 
            display: flex;
            flex-direction: column;

            overscroll-behavior-y: none; 
            -webkit-user-select: none; 
            user-select: none;
        }

        #header {
            flex-shrink: 0; 
            padding: 15px 15px 10px;
            text-align: center;
            background: #1e293b;
        }
        
        #date-log { font-size: 0.75rem; color: #10b981; margin-bottom: 5px; font-weight: bold; }
        
        .page-indicator { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        #question-container {
            min-height: 60px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 1.15rem; font-weight: 700;
            color: var(--text-gold); line-height: 1.4; word-break: keep-all;
        }

        #canvas-wrapper {
            flex-grow: 1; 
            position: relative;
            margin: 10px 15px;
            border-radius: 15px;
            background-color: #1e293b; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
            overflow: hidden;
            border: 1px solid #334155; 
        }
        canvas { width: 100%; height: 100%; touch-action: none; display: block; }

        #controls {
            flex-shrink: 0;
            display: grid; grid-template-columns: 1.2fr 1.2fr 1fr 1.2fr; gap: 8px;
            padding: 10px 15px 15px; 
            background-color: var(--card-bg);
        }
        button {
            padding: 12px 2px; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            word-break: keep-all; 
        }
        .btn-undo { background: #64748b; color: white; }
        .btn-clear { background: #475569; color: white; }
        .btn-prev { background: #334155; color: #94a3b8; }
        .btn-next { background: #eab308; color: #000; }
        
        button:active { transform: scale(0.95); opacity: 0.8; }

        #complete-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        #summary-box {
            width: 100%;
            max-width: 350px;
            max-height: 45vh; 
            overflow-y: auto;
            background: #0f172a;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            text-align: left;
            border: 1px solid #334155;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        #summary-box::-webkit-scrollbar { width: 4px; }
        #summary-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        .summary-item {
            font-size: 0.95rem;
            color: var(--text-white);
            margin-bottom: 12px;
            line-height: 1.45;
            word-break: keep-all;
        }
        .summary-item:last-child { margin-bottom: 0; }
        .summary-num {
            color: #fbbf24;
            font-weight: bold;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div id="header">
    <div id="date-log">최근 달성일: 기록 없음</div>
    <div class="page-indicator" id="page-num">STEP 01 / 10</div>
    <div id="question-container">질문을 불러오는 중...</div>
</div>

<div id="canvas-wrapper">
    <canvas id="writeCanvas"></canvas>
</div>

<div id="controls">
    <button class="btn-undo" onclick="undo()">↩ 취소</button>
    <button class="btn-clear" onclick="clearCanvas()">전체 지움</button>
    <button class="btn-prev" onclick="prevStep()">이전</button>
    <button class="btn-next" onclick="nextStep()" id="next-btn">다음 단계</button>
</div>

<div id="complete-overlay">
    <h2 style="color:#fbbf24; margin-bottom:5px;">Mission Complete!</h2>
    <p id="streak-msg" style="color:#10b981; font-weight:bold; margin-top:5px; margin-bottom:10px;"></p>
    
    <div id="summary-box"></div>
    
    <p style="line-height:1.4; margin-top:10px; margin-bottom:5px; font-size: 0.9rem; color: #94a3b8;">소리 내어 한 번 더 읽어보시면 더욱 좋습니다.</p>
    <button class="btn-next" style="width: 180px; margin-top:10px;" onclick="restart()">처음으로 돌아가기</button>
</div>

<script>
    // 🚀 심플하고 강력한 어포메이션으로 변경!
    const afformations = [
        "왜 나는 이미 충분하고 완벽한가?",
        "왜 매달 5,000만 원이 당연하게 들어오는가?",
        "왜 자산 100억 달성은 이토록 쉬운가?",
        "왜 내 시스템은 잠잘 때도 부를 가져다주는가?",
        "왜 나는 압도적인 성과를 내는 리더인가?",
        "왜 나는 딸에게 최고의 영감이 되는 아빠인가?",
        "왜 내 책은 세상을 바꾸는 베스트셀러인가?",
        "왜 온 우주는 나를 운 좋은 길로만 이끄는가?",
        "왜 나는 평온하게 원하는 현실을 창조하는가?",
        "왜 내 삶은 매일 기적으로 가득한가?"
    ];

    let currentIndex = 0;
    const canvas = document.getElementById('writeCanvas');
    const ctx = canvas.getContext('2d', { desynchronized: true }); 
    let isDrawing = false;
    let undoHistory = []; 

    function loadDateLog() {
        const lastDate = localStorage.getItem('miracle_pen_last_date');
        if (lastDate) {
            document.getElementById('date-log').innerText = `최근 달성일: ${lastDate}`;
        }
    }

    function saveCompletionRecord() {
        const today = new Date().toLocaleDateString('ko-KR');
        let dates = JSON.parse(localStorage.getItem('miracle_pen_dates') || "[]");
        
        if (!dates.includes(today)) {
            dates.push(today);
            localStorage.setItem('miracle_pen_dates', JSON.stringify(dates));
        }
        
        localStorage.setItem('miracle_pen_last_date', today);
        loadDateLog(); 
        
        return dates.length; 
    }

    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = wrapper.clientWidth * dpr;
        canvas.height = wrapper.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        clearCanvas();
    }

    function saveState() {
        if (!canvas.width || !canvas.height) return;
        undoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        if (undoHistory.length > 30) {
            undoHistory.shift(); 
        }
    }

    function undo() {
        if (undoHistory.length > 1) {
            undoHistory.pop(); 
            const previousState = undoHistory[undoHistory.length - 1]; 
            ctx.putImageData(previousState, 0, 0); 
        }
    }

    function clearCanvas() {
        ctx.fillStyle = "#1e293b"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        undoHistory = [];
        saveState();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        isDrawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function draw(e) {
        if (!isDrawing) return;
        const pos = getPos(e);
        
        ctx.lineWidth = 3; 
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#fbbf24'; 
        
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        e.preventDefault();
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            ctx.closePath();
            saveState(); 
        }
    }

    function updateUI() {
        document.getElementById('question-container').innerText = afformations[currentIndex];
        document.getElementById('page-num').innerText = `STEP ${String(currentIndex + 1).padStart(2, '0')} / 10`;
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = (currentIndex === afformations.length - 1) ? "완료하기" : "다음 단계";
        
        clearCanvas();
    }

    function nextStep() {
        if (currentIndex < afformations.length - 1) {
            currentIndex++;
            updateUI();
        } else {
            const totalDays = saveCompletionRecord();
            document.getElementById('streak-msg').innerText = `🔥 누적 ${totalDays}일째 목표 달성 완료!`;
            document.getElementById('complete-overlay').style.display = 'flex';
        }
    }

    function prevStep() {
        if (currentIndex > 0) {
            currentIndex--;
            updateUI();
        }
    }

    function restart() {
        currentIndex = 0;
        document.getElementById('complete-overlay').style.display = 'none';
        updateUI();
    }

    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing, {passive: false});
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    window.onload = () => {
        resizeCanvas();
        updateUI();
        loadDateLog(); 
        
        const summaryBox = document.getElementById('summary-box');
        summaryBox.innerHTML = afformations.map((text, idx) => 
            `<div class="summary-item"><span class="summary-num">${idx + 1}.</span> ${text}</div>`
        ).join('');
    };
    
    window.addEventListener('resize', () => {
        setTimeout(resizeCanvas, 100);
    });
</script>

</body>
</html>
